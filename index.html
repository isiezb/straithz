<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strait of Hormuz — Policy Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<audio id="bg-music" loop preload="auto">
    <source src="assets/bgmusic.mp3" type="audio/mpeg">
</audio>
    <div id="game-container">
        <div class="scanlines-global"></div>
        <canvas id="game-canvas"></canvas>

        <div id="gauge-bar">
            <button id="mute-btn" class="mute-btn" title="Toggle Music">♫</button>
            <div id="hud-day" class="hud-day">DAY 1</div>
            <div class="gauge-item" id="gauge-stability">
                <span class="gauge-label">STABILITY</span>
                <span class="gauge-value">20</span>
                <div class="gauge-track"><div class="gauge-fill danger" style="width:20%"></div></div>
            </div>
            <div class="gauge-item" id="gauge-economy">
                <span class="gauge-label">ECONOMY</span>
                <span class="gauge-value">30</span>
                <div class="gauge-track"><div class="gauge-fill warning" style="width:30%"></div></div>
            </div>
            <div class="gauge-item" id="gauge-support">
                <span class="gauge-label">SUPPORT</span>
                <span class="gauge-value">45</span>
                <div class="gauge-track"><div class="gauge-fill warning" style="width:45%"></div></div>
            </div>
            <div class="gauge-item" id="gauge-intel">
                <span class="gauge-label">INTEL</span>
                <span class="gauge-value">18</span>
                <div class="gauge-track"><div class="gauge-fill danger" style="width:18%"></div></div>
            </div>
            <div id="hud-rating" class="hud-rating">C</div>
            <div id="hud-strait" class="strait-counter">STRAIT: CLOSED</div>
        </div>

        <div id="news-tickers">
            <div id="public-ticker" class="ticker">
                <span class="ticker-label">NEWS</span>
                <div class="ticker-content" id="public-ticker-content"></div>
            </div>
            <div id="intel-ticker" class="ticker intel">
                <span class="ticker-label">INTEL</span>
                <div class="ticker-content" id="intel-ticker-content"></div>
            </div>
        </div>

        <div id="situation-panel" style="display:none"></div>
        <div id="char-select"></div>
        <div id="terminal-overlay"></div>
        <div id="toast-container"></div>
        <!-- Action panel is created dynamically by ui.js -->
    </div>

    <script src="js/policies.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/map.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
