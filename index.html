<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strait of Hormuz — Policy Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- Character Select Overlay -->
        <div id="char-select"></div>

        <!-- Top HUD -->
        <div id="hud">
            <div class="hud-portrait" id="hud-portrait"></div>
            <div class="hud-item">
                <span class="hud-label">Day</span>
                <span id="hud-day" class="hud-value">1/90</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Oil Flow</span>
                <span id="hud-oil-flow" class="hud-value">100%</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Oil Price</span>
                <span id="hud-oil-price" class="hud-value">$80</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Tension</span>
                <span id="hud-tension" class="hud-value">Low</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Approval</span>
                <span id="hud-approval" class="hud-value">72%</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Conflict Risk</span>
                <span id="hud-conflict-risk" class="hud-value good">0%</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Budget</span>
                <span id="hud-budget" class="hud-value good">$1000M</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Crisis</span>
                <span id="hud-crisis" class="hud-value good">None</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Rating</span>
                <span id="hud-rating" class="hud-value good">S</span>
            </div>
        </div>

        <!-- Policy Panel (right side) -->
        <div id="policy-panel">
            <h2>US Policies <span id="daily-cost" class="daily-cost-display"></span></h2>
            <div id="policy-list"></div>
        </div>

        <!-- Event Log (bottom) -->
        <div id="event-log">
            <div id="event-log-inner"></div>
        </div>

        <!-- Speed Controls -->
        <div id="speed-controls">
            <button id="btn-pause" class="speed-btn active" title="Pause [0]">||</button>
            <button id="btn-1x" class="speed-btn" title="1x Speed [1]">1x</button>
            <button id="btn-2x" class="speed-btn" title="2x Speed [2]">2x</button>
            <button id="btn-4x" class="speed-btn" title="4x Speed [3]">4x</button>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>

        <!-- Keyboard hints -->
        <div id="kb-hints">
            SPACE: play/pause | 1-3: speed | ESC: deselect | Click: inspect
        </div>
    </div>

    <script src="js/policies.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/map.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
