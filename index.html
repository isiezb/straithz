<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strait of Hormuz — Policy Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="game-canvas"></canvas>

        <!-- Character Select Overlay -->
        <div id="char-select"></div>

        <!-- Top Gauges -->
        <div id="gauge-bar">
            <div id="hud-week" class="gauge-week">WEEK 1 — DAY 1/7</div>
            <div class="gauge-item" id="gauge-stability">
                <span class="gauge-label">STABILITY</span>
                <div class="gauge-track"><div class="gauge-fill good" style="width:60%"></div></div>
                <span class="gauge-val good">Stable</span>
            </div>
            <div class="gauge-item" id="gauge-economy">
                <span class="gauge-label">ECONOMY</span>
                <div class="gauge-track"><div class="gauge-fill good" style="width:60%"></div></div>
                <span class="gauge-val good">Stable</span>
            </div>
            <div class="gauge-item" id="gauge-support">
                <span class="gauge-label">SUPPORT</span>
                <div class="gauge-track"><div class="gauge-fill good" style="width:60%"></div></div>
                <span class="gauge-val good">Stable</span>
            </div>
            <div class="gauge-item" id="gauge-intel">
                <span class="gauge-label">INTEL</span>
                <div class="gauge-track"><div class="gauge-fill warning" style="width:25%"></div></div>
                <span class="gauge-val warning">Weak</span>
            </div>
            <div class="gauge-item" id="gauge-unique" style="display:none">
                <span class="gauge-label">RESOURCE</span>
                <div class="gauge-track"><div class="gauge-fill good" style="width:50%"></div></div>
                <span class="gauge-val good">50</span>
            </div>
            <div id="hud-escalation" class="esc-track" style="display:none">
                <span class="esc-label">ESCALATION</span>
                <span class="esc-pips"></span>
            </div>
            <div id="hud-strait" class="strait-counter">STRAIT: CONTESTED</div>
        </div>

        <!-- Advisor Console (right side) -->
        <div id="advisor-console">
            <div class="advisor-header">
                <div id="advisor-portrait" class="advisor-portrait"></div>
                <div class="advisor-info">
                    <div id="advisor-name" class="advisor-name">Advisor</div>
                    <div id="advisor-title" class="advisor-title-text">Title</div>
                </div>
            </div>
            <div id="advisor-text" class="advisor-speech"></div>
            <div id="advisor-status" class="advisor-status"></div>
        </div>

        <!-- Event Log (below canvas) -->
        <div id="event-log">
            <div class="event-log-header">SITUATION LOG</div>
        </div>

        <!-- Special Action Button -->
        <button id="special-action-btn" class="special-action-btn" style="display:none"></button>

        <!-- News Ticker (bottom) -->
        <div id="news-ticker">
            <span class="ticker-label">BREAKING</span>
            <div id="news-ticker-scroll">
                <div id="news-ticker-inner"></div>
            </div>
        </div>

        <!-- Toast Notifications -->
        <div id="toast-container"></div>
    </div>

    <script src="js/policies.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/map.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
