<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strait of Hormuz — Policy Simulator</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="game-container">
        <div class="scanlines-global"></div>
        <canvas id="game-canvas"></canvas>

        <div id="gauge-bar">
            <div id="hud-day" class="hud-day">DAY 1</div>
            <div class="gauge-item" id="gauge-stability">
                <span class="gauge-label">STABILITY</span>
                <span class="gauge-value">72</span>
                <div class="gauge-track"><div class="gauge-fill good" style="width:72%"></div></div>
            </div>
            <div class="gauge-item" id="gauge-economy">
                <span class="gauge-label">ECONOMY</span>
                <span class="gauge-value">68</span>
                <div class="gauge-track"><div class="gauge-fill good" style="width:68%"></div></div>
            </div>
            <div class="gauge-item" id="gauge-support">
                <span class="gauge-label">SUPPORT</span>
                <span class="gauge-value">65</span>
                <div class="gauge-track"><div class="gauge-fill good" style="width:65%"></div></div>
            </div>
            <div class="gauge-item" id="gauge-intel">
                <span class="gauge-label">INTEL</span>
                <span class="gauge-value">25</span>
                <div class="gauge-track"><div class="gauge-fill danger" style="width:25%"></div></div>
            </div>
            <div id="hud-rating" class="hud-rating">C</div>
            <div id="hud-strait" class="strait-counter">STRAIT: CONTESTED</div>
        </div>

        <div id="char-select"></div>
        <div id="terminal-overlay"></div>
        <div id="toast-container"></div>
    </div>

    <script src="js/policies.js"></script>
    <script src="js/simulation.js"></script>
    <script src="js/sprites.js"></script>
    <script src="js/map.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
